<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788">
<defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.13"/></filter></defs>
<rect width="100%" height="100%" fill="#F5F7FB"/><text x="70" y="90" font-size="54" font-weight="700" fill="#1F2937" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">一个能落地的认知流程</text>
<text x="74" y="145" font-size="30" font-weight="400" fill="#6B7280" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">遇到重要问题时，按这个顺序走一遍</text>
<rect x="70" y="255" width="220" height="250" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
<circle cx="180" cy="310" r="38" fill="#2563EB"/>
<text x="180" y="323" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">1</text>
<text x="180" y="385" font-size="30" font-weight="700" fill="#111827" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">写清问题</text>
<text x="98" y="435.0" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">把“我要不要换工</text>
<text x="98" y="466.74" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">作”改成具体风险</text>
<text x="98" y="498.48" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">和收益</text>
<line x1="290" y1="380" x2="328" y2="380" stroke="#9CA3AF" stroke-width="5"/>
<path d="M328 380 L312 368 L312 392 Z" fill="#9CA3AF"/>
<rect x="330" y="255" width="220" height="250" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
<circle cx="440" cy="310" r="38" fill="#7C3AED"/>
<text x="440" y="323" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">2</text>
<text x="440" y="385" font-size="30" font-weight="700" fill="#111827" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">分开事实和观点</text>
<text x="358" y="435.0" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">事实是证据，观点</text>
<text x="358" y="466.74" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">只是解释</text>
<line x1="550" y1="380" x2="588" y2="380" stroke="#9CA3AF" stroke-width="5"/>
<path d="M588 380 L572 368 L572 392 Z" fill="#9CA3AF"/>
<rect x="590" y="255" width="220" height="250" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
<circle cx="700" cy="310" r="38" fill="#F97316"/>
<text x="700" y="323" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">3</text>
<text x="700" y="385" font-size="30" font-weight="700" fill="#111827" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">主动找反证</text>
<text x="618" y="435.0" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">问自己：什么证据</text>
<text x="618" y="466.74" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">说明我错了？</text>
<line x1="810" y1="380" x2="848" y2="380" stroke="#9CA3AF" stroke-width="5"/>
<path d="M848 380 L832 368 L832 392 Z" fill="#9CA3AF"/>
<rect x="850" y="255" width="220" height="250" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
<circle cx="960" cy="310" r="38" fill="#10B981"/>
<text x="960" y="323" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">4</text>
<text x="960" y="385" font-size="30" font-weight="700" fill="#111827" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">做小实验</text>
<text x="878" y="435.0" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">用现实反馈代替脑</text>
<text x="878" y="466.74" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">内推演</text>
<line x1="1070" y1="380" x2="1108" y2="380" stroke="#9CA3AF" stroke-width="5"/>
<path d="M1108 380 L1092 368 L1092 392 Z" fill="#9CA3AF"/>
<rect x="1110" y="255" width="220" height="250" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="3"/>
<circle cx="1220" cy="310" r="38" fill="#0F766E"/>
<text x="1220" y="323" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">5</text>
<text x="1220" y="385" font-size="30" font-weight="700" fill="#111827" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">复盘判断过程</text>
<text x="1138" y="435.0" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">别只看输赢，要看</text>
<text x="1138" y="466.74" font-size="23" font-weight="400" fill="#4B5563" text-anchor="start" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">当初怎么判断</text>
<rect x="250" y="620" width="900" height="72" rx="26" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
<text x="700" y="665" font-size="32" font-weight="700" fill="#92400E" text-anchor="middle" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, Microsoft YaHei, sans-serif">别追求一次想明白，追求每次少错一点。</text></svg>