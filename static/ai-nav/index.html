<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI工具导航 - 汇聚2000+优质AI工具，覆盖写作、绘画、视频、编程、办公等全场景" />
  <title>AI 导航 · 全网AI工具一站直达</title>
  <link rel="preconnect" href="https://www.ailookme.com" />
  <link rel="preconnect" href="https://ai-bot.cn" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo">◆</span>
      <span class="brand-name">AI<em>导航</em></span>
    </div>
    <nav class="cat-nav" id="catNav" aria-label="分类导航"></nav>
    <div class="sidebar-foot">
      <span id="metaInfo"></span>
    </div>
  </aside>

  <!-- Mobile sidebar overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="菜单">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="m21 21-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="search" id="searchInput" placeholder="搜索 AI 工具、关键词…" autocomplete="off" />
        <kbd class="search-kbd">/</kbd>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeBtn" aria-label="切换主题" title="切换深色/浅色">
          <svg class="ic-sun" viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg class="ic-moon" viewBox="0 0 24 24" width="20" height="20"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>
        </button>
        <a class="icon-btn" href="https://github.com" target="_blank" rel="noopener" aria-label="源" title="数据来源说明">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2a10 10 0 0 0-3.2 19.5c.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.7.4-1.1.7-1.4-2.2-.300000-4.6-1.1-4.6-4.9 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.8-2.4 4.6-4.6 4.9.4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0 0 12 2Z" fill="currentColor"/></svg>
        </a>
      </div>
    </header>

    <main class="content" id="content">
      <!-- Hero -->
      <section class="hero">
        <h1 class="hero-title">发现最好用的 <span class="grad">AI 工具</span></h1>
        <p class="hero-sub">汇聚 <b id="heroCount">…</b> 款优质 AI 工具，覆盖写作、绘画、视频、编程、办公全场景，每日自动同步更新。</p>
        <div class="hero-tags" id="heroTags"></div>
      </section>

      <!-- Search results banner -->
      <div class="search-result-bar" id="searchBar" hidden>
        <span id="searchResultText"></span>
        <button class="clear-btn" id="clearSearch">清除 ✕</button>
      </div>

      <!-- Tool sections render here -->
      <div id="sections"></div>

      <footer class="site-footer">
        <p>数据聚合自公开 AI 工具导航站，每日自动更新 · 仅供学习交流</p>
        <p class="footer-meta" id="footerMeta"></p>
      </footer>
    </main>
  </div>

  <button class="to-top" id="toTop" aria-label="回到顶部" hidden>↑</button>

  <script src="js/app.js" defer></script>
</body>
</html>
