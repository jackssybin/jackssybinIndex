<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="80" y="88" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#111827">文本对话：OpenAI 兼容调用链路</text>
  <g font-family="Segoe UI, Arial" font-size="20" fill="#111827">
    <rect x="90" y="170" width="250" height="110" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="130" y="215" font-weight="700">客户端 / CLI</text><text x="130" y="250" fill="#6b7280">curl、Codex、Cline</text>
    <path d="M350 225 H505" stroke="#f97316" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="520" y="150" width="280" height="150" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <text x="560" y="202" font-weight="700">9Router /v1</text><text x="560" y="238" fill="#9a3412">鉴权、模型解析、fallback</text><text x="560" y="270" fill="#9a3412">RTK token 节省</text>
    <path d="M815 225 H970" stroke="#f97316" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="985" y="170" width="230" height="110" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="1025" y="215" font-weight="700">上游模型</text><text x="1025" y="250" fill="#6b7280">Kiro / GLM / Gemini</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker></defs>
  <rect x="90" y="380" width="1125" height="250" rx="18" fill="#0f172a"/>
  <text x="125" y="430" font-family="Consolas, monospace" font-size="22" fill="#a7f3d0">curl http://localhost:20128/v1/chat/completions \</text>
  <text x="125" y="470" font-family="Consolas, monospace" font-size="22" fill="#a7f3d0">  -H "Authorization: Bearer YOUR_9ROUTER_KEY" \</text>
  <text x="125" y="510" font-family="Consolas, monospace" font-size="22" fill="#a7f3d0">  -H "Content-Type: application/json" \</text>
  <text x="125" y="550" font-family="Consolas, monospace" font-size="22" fill="#a7f3d0">  -d '{"model":"auto","messages":[{"role":"user","content":"写一个 JS 防抖函数"}]}'</text>
</svg>
