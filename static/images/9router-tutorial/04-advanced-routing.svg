  <g font-family="Segoe UI, Arial" font-size="20">
    <rect x="100" y="175" width="245" height="105" rx="18" fill="#fff7ed" stroke="#fdba74"/><text x="140" y="218" font-weight="700" fill="#9a3412">Combo: coding</text><text x="140" y="250" fill="#7c2d12">优先高质量模型</text>
    <path d="M345 228 H475" stroke="#f97316" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="500" y="145" width="260" height="165" rx="22" fill="#ffffff" stroke="#e5e7eb"/><text x="545" y="195" font-weight="700" fill="#111827">路由策略</text><text x="545" y="235" fill="#4b5563">1. 订阅模型</text><text x="545" y="268" fill="#4b5563">2. 低价 API</text><text x="545" y="301" fill="#4b5563">3. 免费模型</text>
    <path d="M760 228 H895" stroke="#f97316" stroke-width="5" marker-end="url(#arrow)"/>
