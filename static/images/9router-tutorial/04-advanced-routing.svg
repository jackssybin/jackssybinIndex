  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker></defs>
  <rect x="100" y="390" width="1080" height="210" rx="22" fill="#111827"/>
  <text x="135" y="445" font-family="Consolas, monospace" font-size="22" fill="#fde68a">建议配置：</text>
