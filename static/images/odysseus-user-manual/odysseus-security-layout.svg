<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#a7f3d0"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="78" fill="#ffffff" font-size="36" font-family="Microsoft YaHei, Arial" font-weight="700">安全访问推荐结构</text>
  <text x="60" y="118" fill="#c7d2fe" font-size="20" font-family="Microsoft YaHei, Arial">只暴露经过认证的 Odysseus 入口，内部服务保持私有</text>
  <g font-family="Microsoft YaHei, Arial">
    <rect x="70" y="235" width="220" height="140" rx="18" fill="#1e293b" stroke="#93c5fd" stroke-width="2"/>
    <text x="180" y="292" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">你的设备</text>
    <text x="180" y="330" text-anchor="middle" fill="#cbd5e1" font-size="18">电脑 / 手机 / 平板</text>
    <rect x="385" y="215" width="250" height="180" rx="20" fill="#064e3b" stroke="#6ee7b7" stroke-width="2"/>
    <text x="510" y="275" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">安全访问层</text>
    <text x="510" y="315" text-anchor="middle" fill="#d1fae5" font-size="18">Tailscale / Caddy</text>
    <text x="510" y="345" text-anchor="middle" fill="#d1fae5" font-size="18">Cloudflare Access</text>
    <rect x="750" y="120" width="300" height="130" rx="18" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="900" y="172" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">Odysseus</text>
    <text x="900" y="210" text-anchor="middle" fill="#bae6fd" font-size="18">127.0.0.1:7000</text>
    <rect x="750" y="340" width="300" height="150" rx="18" fill="#431407" stroke="#fdba74" stroke-width="2"/>
    <text x="900" y="392" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">内部服务</text>
    <text x="900" y="430" text-anchor="middle" fill="#fed7aa" font-size="18">Ollama / ChromaDB</text>
    <text x="900" y="460" text-anchor="middle" fill="#fed7aa" font-size="18">SearXNG / 数据库 / 模型 API</text>
    <line x1="290" y1="305" x2="370" y2="305" stroke="#a7f3d0" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="635" y1="305" x2="735" y2="185" stroke="#a7f3d0" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="900" y1="250" x2="900" y2="325" stroke="#fca5a5" stroke-width="5" marker-end="url(#arrow)"/>
  </g>
  <text x="70" y="565" fill="#e5e7eb" font-size="18" font-family="Microsoft YaHei, Arial">关键原则：AUTH_ENABLED=true，不要把 ChromaDB、Ollama、数据库、模型端口直接暴露到公网。</text>
</svg>
