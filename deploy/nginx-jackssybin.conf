server {
    listen 80;
    server_name jackssybin.cn www.jackssybin.cn;

    root /var/www/jackssybin;
    index index.html;

    access_log /var/log/nginx/jackssybin.access.log;
    error_log /var/log/nginx/jackssybin.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # GoAccess uses runtime templates in its standalone HTML report.
    # Keep this CSP override scoped to the private report page only.
    location = /admin/report.html {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
