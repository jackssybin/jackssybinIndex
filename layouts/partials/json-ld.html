{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify | safeJS }},
  "description": {{ with .Description }}{{ . | jsonify | safeJS }}{{ else }}{{ .Summary | plainify | jsonify | safeJS }}{{ end }},
  "author": {
    "@type": "Person",
    "name": {{ .Site.Params.author | jsonify | safeJS }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ .Site.Title | jsonify | safeJS }},
    "logo": {
      "@type": "ImageObject",
      "url": {{ (print .Site.BaseURL "favicon.svg") | jsonify | safeJS }}
    }
  },
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05-07:00" | jsonify | safeJS }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05-07:00" | jsonify | safeJS }},
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify | safeJS }}
  }
  {{- with .Params.images }}
  ,"image": [
    {{- range $index, $img := . }}
    {{- if $index }},{{ end }}
    {{ $img | jsonify | safeJS }}
    {{- end }}
  ]
  {{- end }}
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "首页",
      "item": {{ .Site.BaseURL | jsonify | safeJS }}
    }
    {{- if .CurrentSection }}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": {{ .CurrentSection.Title | jsonify | safeJS }},
      "item": {{ .CurrentSection.Permalink | jsonify | safeJS }}
    }
    {{- end }}
    ,{
      "@type": "ListItem",
      "position": {{ if .CurrentSection }}3{{ else }}2{{ end }},
      "name": {{ .Title | jsonify | safeJS }}
    }
  ]
}
</script>
{{- end }}
