<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity="0.16"/></filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="56" y="54" width="1168" height="652" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="56" y="54" width="260" height="652" rx="28" fill="#111827"/>
  <text x="92" y="112" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#fff">9Router</text>
  <text x="92" y="150" font-family="Segoe UI, Arial" font-size="17" fill="#fdba74">智能 AI 路由控制台</text>
  <g font-family="Segoe UI, Arial" font-size="20" fill="#d1d5db">
    <text x="96" y="220">① Dashboard 总览</text>
    <text x="96" y="274">② Providers 提供商</text>
    <text x="96" y="328">③ Media Providers 媒体</text>
    <text x="96" y="382">④ CLI Tools 工具</text>
    <text x="96" y="436">⑤ Usage 用量</text>
    <text x="96" y="490">⑥ Settings 设置</text>
  </g>
  <text x="360" y="122" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#111827">首次打开控制台</text>
  <text x="360" y="160" font-family="Segoe UI, Arial" font-size="18" fill="#6b7280">地址：http://localhost:20128/dashboard</text>
  <g transform="translate(360,210)">
    <rect width="790" height="110" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="28" y="44" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#9a3412">第一步：连接模型提供商</text>
    <text x="28" y="78" font-family="Segoe UI, Arial" font-size="17" fill="#7c2d12">可先选 Kiro / OpenCode Free / Gemini / OpenRouter，填入账号或 API Key。</text>
  </g>
  <g transform="translate(360,350)">
    <rect width="790" height="110" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="28" y="44" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#1d4ed8">第二步：复制 OpenAI 兼容端点</text>
    <text x="28" y="78" font-family="Consolas, monospace" font-size="18" fill="#1e3a8a">Base URL = http://localhost:20128/v1</text>
  </g>
  <g transform="translate(360,490)">
    <rect width="790" height="110" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="28" y="44" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#15803d">第三步：在 Codex / Cline / Cursor 中使用</text>
    <text x="28" y="78" font-family="Segoe UI, Arial" font-size="17" fill="#166534">模型名使用 provider/model，例如 kr/claude-sonnet-4.5 或 auto。</text>
  </g>
</svg>
