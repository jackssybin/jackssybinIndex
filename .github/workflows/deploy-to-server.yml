name: Deploy to Server

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Fetch hourly hot news
        run: pnpm fetch-hot-news

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AI nav scraper deps
        run: pip install requests beautifulsoup4 lxml

      - name: Refresh AI nav data
        continue-on-error: true
        run: python scripts/ai-nav/update.py


      - name: Sync Hugo data
        run: pnpm sync:hugo

      - name: Build Hugo static site
        run: hugo --destination public --minify --cleanDestinationDir

      - name: Deploy dist to server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || 22 }}
          SOURCE: public/
          TARGET: ${{ secrets.SERVER_PATH }}
          ARGS: -rlgoDzvc --delete --exclude=admin/**
      - name: Submit changed URLs to Baidu
        continue-on-error: true
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: |
          # 只推送本次部署里改动的正文，避免耗尽百度当日配额（新站每天 10 条）
          if [ -z "$BAIDU_PUSH_TOKEN" ]; then
            echo "BAIDU_PUSH_TOKEN 未配置，跳过百度推送"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          echo "Diff range: $BEFORE..HEAD"
          export BAIDU_PUSH_DIFF_BASE="$BEFORE"
          export BAIDU_PUSH_DIFF_HEAD="HEAD"
          node scripts/baidu-push.mjs --changed
