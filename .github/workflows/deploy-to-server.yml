name: Deploy to Server

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Fetch hourly hot news
        run: pnpm fetch-hot-news

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AI nav scraper deps
        run: pip install requests beautifulsoup4 lxml

      - name: Refresh AI nav data
        continue-on-error: true
        run: python scripts/ai-nav/update.py


      - name: Sync Hugo data
        run: pnpm sync:hugo

      - name: Build Hugo static site
        run: hugo --destination public --minify --cleanDestinationDir

      - name: Deploy dist to server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || 22 }}
          SOURCE: public/
          TARGET: ${{ secrets.SERVER_PATH }}
          ARGS: -rlgoDzvc --delete --exclude=admin/**
      - name: Submit URLs to Baidu
        continue-on-error: true
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: node scripts/baidu-push.mjs https://jackssybin.cn/sitemap.xml