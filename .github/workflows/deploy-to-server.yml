name: Deploy to Server

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Fetch hourly hot news
        run: pnpm fetch-hot-news

      - name: Export Hugo content
        run: pnpm export:hugo

      - name: Build Hugo static site
        run: hugo --source hugo-site --destination hugo-site/public --minify

      - name: Publish latest hot news JSON
        run: cp content/hot-news.json hugo-site/public/hot-news.json

      - name: Deploy dist to server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || 22 }}
          SOURCE: hugo-site/public/
          TARGET: ${{ secrets.SERVER_PATH }}
          ARGS: -rlgoDzvc --delete --exclude=admin/**
